<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kodi Addon Repository</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a192f; /* mély tengerkék */
      color: #cbd5e1; /* halvány kékeszürke */
      margin: 0;
      padding: 20px;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
    }
    h1 {
      margin: 0;
      font-weight: 700;
      color: #3ea6ff; /* élénk kék */
      text-shadow: 0 0 8px #1e40af; /* lágy fény */
    }
    p {
      color: #94a3b8; /* halkabb kékeszürke */
    }
    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: 0 auto;
    }
    li {
      background: rgba(30, 64, 175, 0.3); /* áttetsző kékes háttér */
      margin-bottom: 15px;
      padding: 15px 20px;
      border-radius: 8px;
      transition: background 0.3s ease;
      box-shadow: 0 2px 6px rgba(30, 64, 175, 0.5);
    }
    li:hover {
      background: rgba(62, 166, 255, 0.6);
      box-shadow: 0 4px 12px rgba(62, 166, 255, 0.8);
    }
    a {
      color: #e0e7ff; /* világos kék */
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1em;
    }
    a:hover {
      text-decoration: underline;
      color: #a5b4fc; /* lágyabb világos kék */
    }
    footer {
      margin-top: 50px;
      text-align: center;
      font-size: 0.9em;
      color: #64748b; /* halk kékeszürke */
    }
  </style>
</head>
<body>
  <header>
    <h1>Kodi Addon Repository</h1>
    <p>Friss addonok és repo fájlok letöltése</p>
  </header>
  <main>
    <ul>
      <li><a href="repository.thecrew-0.3.7.zip">repository.thecrew-0.3.7.zip</a></li>
      <li><a href="repository.movieshark-2.7.2.zip">repository.movieshark-2.7.2.zip</a></li>
      <li><a href="plugin.audio.radio_de-3.0.9+matrix.1.zip">plugin.audio.radio_de-3.0.9+matrix.1.zip</a></li>
    </ul>
  </main>
  <footer>
    &copy; 2025 Tibi's Kodi Repo
  </footer>
</body>
</html>
