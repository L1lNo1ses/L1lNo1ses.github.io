<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kodi Addon Repo - Éjszakai Szalon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
    body {
      margin: 0; 
      padding: 0 20px; 
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0d1b2a, #1b263b 70%);
      color: #a1caff;
      height: 100vh;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
    }
    header {
      text-align: center;
      margin-bottom: 40px;
      text-shadow: 0 0 10px #3fa9f5;
    }
    h1 {
      font-size: 3rem;
      margin: 0;
      color: #ffffffff;
      letter-spacing: 3px;
    }
    p {
      font-size: 1.1rem;
      color: #ffffffff;
      margin-top: 5px;
    }
    ul {
      list-style: none;
      padding: 0;
      width: 100%;
      max-width: 480px;
      border: 2px solid #3fa9f5;
      border-radius: 15px;
      background: rgba(10, 25, 45, 0.75);
      box-shadow: 0 0 20px #3fa9f5aa;
    }
    li {
      border-bottom: 1px solid #3fa9f5aa;
      padding: 18px 25px;
      transition: background 0.3s ease, transform 0.2s ease;
      cursor: pointer;
    }
    li:last-child {
      border-bottom: none;
    }
    li:hover {
      background: #3fa9f5bb;
      color: #0d1b2a;
      transform: scale(1.05);
      box-shadow: 0 0 15px #3fa9f5cc;
    }
    a {
      color: inherit;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.2rem;
      display: block;
    }
    footer {
      margin-top: 50px;
      font-size: 0.9rem;
      color: #3fa9f588;
      text-shadow: none;
    }
    .smoke-wrapper {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.smoke {
  position: absolute;
  bottom: -200px;
  left: 50%;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0) 80%);
  animation: smokeRise 25s linear infinite;
  opacity: 0.4;
  transform: translateX(-50%);
}

.smoke.delay {
  animation-delay: 10s;
}

@keyframes smokeRise {
  0% {
    transform: translateX(-50%) translateY(0) scale(1);
    opacity: 0.4;
  }
  50% {
    transform: translateX(-60%) translateY(-50vh) scale(1.3);
    opacity: 0.2;
  }
  100% {
    transform: translateX(-40%) translateY(-100vh) scale(1.6);
    opacity: 0;
  }
}
  </style>
</head>
<body>
  <div class="smoke-wrapper">
    <div class="smoke"></div>
    <div class="smoke delay"></div>
  </div>
  <header>
    <h1>Kodi Addon Repo</h1>
    <p>Friss, stabil, és menő kiegészítők egy helyen</p>
  </header>

  </ul>
  <footer>&copy; 2025 Tibi's Kodi Repo</footer>
</body>
</html>
